services:
  cotadb:
    build:
      context: ./Postgres
    image: cotadb:latest
    container_name: cotadb
    # restart: unless-stopped
    # user: cota
    environment:
      - POSTGRES_DB=${POSTGRESQL_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # volumes: 
    #   - backupdb:/var/lib/postgresql/data
  # pgbackups:
  #   image: prodrigestivill/postgres-backup-local
  #   container_name: backups
  #   restart: always
  #   user: postgres:postgres # Optional: see below
  #   volumes:
  #     - /var/opt/pgbackups:/backups
  #   links:
  #     - cotadb
  #   depends_on:
  #     - cotadb
  #   environment:
  #     - POSTGRES_HOST=postgres
  #     - POSTGRES_DB=backupdb
  #     - POSTGRES_USER=${POSTGRES_USER}
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
  #   #  - POSTGRES_PASSWORD_FILE=/run/secrets/db_password <-- alternative for POSTGRES_PASSWORD (to use with docker secrets)
  #     - POSTGRES_EXTRA_OPTS=-Z6 --schema=public --blobs
  #     - SCHEDULE=@every 0h1m30s
  #     - BACKUP_KEEP_DAYS=7
  #     - BACKUP_KEEP_WEEKS=4
  #     - BACKUP_KEEP_MONTHS=6
  #     - HEALTHCHECK_PORT=8080
  graph:
    # image: graphile/postgraphile
    build:
      context: ./Graphql
    image: graph
    container_name: graph
    restart: unless-stopped
    depends_on:
      - cotadb
    ports:
      - "5000:5000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRESQL_DB=${POSTGRESQL_DB}
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@cotadb:5432/${POSTGRESQL_DB}
    command: [
      "--append-plugins", "postgraphile-plugin-connection-filter",
      "--connection", "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@cotadb:5432/${POSTGRESQL_DB}",
      "--schema", "general,support,userdata,places",
      "--host", "0.0.0.0",
      "--port", "5000",
      "--enhance-graphiql",
      "--cors"
    ]
  api:
    build:
      context: ./Restful
      args:
      #   - DOMAIN=${DOMAIN}
      #   - API_URL="${API_PROTOCOL}://${SERVER_IP}:${API_PORT}"
        - API_PORT=${API_PORT}
        - REACT_APP_GRAPH_ADDR=${GRAPH_ADDR}
        - REACT_APP_GRAPH_PROTOCOL=${GRAPH_PROTOCOL}
      #   - SERVER_IP=${SERVER_IP}
      #   - CLIENT_SECRET=${CLIENT_SECRET}
      #   - CLIENT_PASS=${CLIENT_PASS}
      #   - APP_KEY=${APP_KEY}
    environment:
      - REACT_APP_DOMAIN=${DOMAIN}
      - REACT_APP_CLIENT_SECRET=${CLIENT_SECRET}
      - REACT_APP_CLIENT_PASS=${CLIENT_PASS}
      - REACT_APP_APP_KEY=${APP_KEY}
      - REACT_APP_API_KEY=${API_KEY}
      - REACT_APP_SK_KEY=${SK_KEY}
      - REACT_APP_WHSEC=${WHSEC}
      - REACT_APP_GRAPH_ADDR=${GRAPH_ADDR}
      - REACT_APP_GRAPH_PROTOCOL=${GRAPH_PROTOCOL}
    image: api-${PROJECT_NAME}:production
    container_name: api
    restart: unless-stopped
    volumes:
      - ./Restful/assets/src:/opt/app
    depends_on:
      - graph
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT}"]
      interval: 20s
      timeout: 5s
      retries: 5
    ports:
      - 8000:${API_PORT}

volumes:
  backupdb:
      driver: local